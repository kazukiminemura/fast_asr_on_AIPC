<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIPC ASR</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>AIPC ASR</h1>
          <p>Japanese live transcription</p>
        </div>
        <span id="deviceStatus" class="status">checking devices</span>
      </header>

      <section class="controls" aria-label="Live transcription controls">
        <input id="model" name="model" type="hidden" value="neosophie/Qwen3-ASR-1.7B-JA" />

        <label class="device-field">
          <span>Device</span>
          <select id="device" name="device">
            <option value="auto">auto</option>
            <option value="intel_npu">intel npu</option>
            <option value="intel_gpu">intel gpu</option>
            <option value="cpu">cpu</option>
          </select>
        </label>

        <div class="button-row">
          <button id="startLiveButton" class="primary" type="button">Start</button>
          <button id="stopLiveButton" type="button" disabled>Stop</button>
          <button id="clearButton" type="button">Clear</button>
        </div>

        <div class="meter" aria-hidden="true">
          <div id="meterBar"></div>
        </div>

        <span id="runStatus" class="status">idle</span>
      </section>

      <div id="warmupNotice" class="warmup-notice">
        First start may take a while while the Japanese model is downloaded, converted, and warmed up.
      </div>

      <section class="workspace">
        <section class="transcript-pane" aria-label="Transcript">
          <div class="output-header">
            <h2>Transcript</h2>
            <span id="liveLog">waiting</span>
          </div>
          <pre id="transcript"></pre>
        </section>

        <aside id="metrics" class="metrics" aria-label="Latest metrics"></aside>
      </section>

      <div id="micPane" class="hidden"></div>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
